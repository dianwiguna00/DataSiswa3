<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Siswa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-size:20px;
}


body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:#eef2f7;
    color:#333;
}

.header{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:600;
    letter-spacing:1px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#0d6efd;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #d6dce5;
    border-radius:10px;
    font-size:14px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 0 3px rgba(13,110,253,.15);
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-primary{
    background:#0d6efd;
    color:white;
}

.btn-success{
    background:#198754;
    color:white;
}

.btn-warning{
    background:#ffc107;
    color:black;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

.btn-dark{
    background:#212529;
    color:white;
}

.table-container{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:700px;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
    position:sticky;
    top:0;
}

td{
    padding:10px;
    border-bottom:1px solid #eeeeee;
}

tr:nth-child(even){
    background:#f8f9fa;
}

tr:hover{
    background:#e9f2ff;
}

td button{
    width:auto;
    padding:8px 14px;
    background:#0d6efd;
    color:white;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.stat-card h2{
    color:#0d6efd;
    font-size:36px;
}

.stat-card p{
    color:#666;
    margin-top:5px;
}

.footer{
    text-align:center;
    padding:20px;
    color:#777;
    font-size:13px;
}

@media(max-width:768px){

    .header{
        font-size:20px;
    }

    .container{
        padding:12px;
    }

    button{
        width:100%;
    }

}
</style>
</head>

<body>

<div class="header">DATA PESERTA DIDIK</div>

<div class="container">

<div class="stats">

    <div class="stat-card">
        <h2 id="totalSiswa">0</h2>
        <p>Total Peserta Didik</p>
    </div>

</div>
<div class="card">
<h3>Pencarian</h3>
<input id="search" placeholder="Cari nama / NISN..." onkeyup="renderTable()">
</div>

<div class="card">
<h3>Form</h3>

<input id="nis" placeholder="NIS">
<input id="nisn" placeholder="NISN">
<input id="nama" placeholder="Nama">
<input id="jk" placeholder="L/P">
<input id="tempat" placeholder="Tempat Lahir">
<input id="tanggal" placeholder="Tanggal Lahir">
<input id="alamat" placeholder="Alamat">

<button class="btn-success" onclick="tambah()">Tambah</button>
<button class="btn-warning" onclick="editData()">Edit/Simpan</button>
<button class="btn-danger" onclick="hapus()">Hapus</button>
<button class="btn-dark" onclick="clearForm()">Bersihkan</button>
<button class="btn-primary" onclick="downloadCSV()">Download</button>

</div>

<div class="card">
<h3>Data Siswa</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>NIS</th>
<th>NISN</th>
<th>Nama</th>
<th>JK</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

</div>

<script>

var dataSiswa = [];

// ================= LOAD =================
function load(){
let d = localStorage.getItem("dataSiswa");
if(d){
dataSiswa = JSON.parse(d);
}
renderTable();
}

// ================= SAVE =================
function save(){
localStorage.setItem("dataSiswa", JSON.stringify(dataSiswa));
}

// ================= TAMPIL =================
function renderTable(){

let key = search.value.toLowerCase();
let tbody = "";

dataSiswa.forEach((d,i)=>{

if(
d.nama.toLowerCase().includes(key) ||
d.nisn.includes(key)
){

tbody += `
<tr>
<td>${d.nis}</td>
<td>${d.nisn}</td>
<td>${d.nama}</td>
<td>${d.jk}</td>
<td><button onclick="pilih(${i})">Pilih</button></td>
</tr>`;
}
document.getElementById("totalSiswa").innerText =
dataSiswa.length;
});

document.getElementById("tbody").innerHTML = tbody;
}

// ================= PILIH =================
function pilih(i){
let d = dataSiswa[i];

nis.value = d.nis;
nisn.value = d.nisn;
nama.value = d.nama;
jk.value = d.jk;
tempat.value = d.tempat;
tanggal.value = d.tanggal;
alamat.value = d.alamat;
}

// ================= TAMBAH =================
function tambah(){

dataSiswa.push({
nis:nis.value,
nisn:nisn.value,
nama:nama.value,
jk:jk.value,
tempat:tempat.value,
tanggal:tanggal.value,
alamat:alamat.value
});

save();
renderTable();
clearForm();
}

// ================= EDIT =================
function editData(){

let idx = dataSiswa.findIndex(d => d.nisn === nisn.value);

if(idx === -1){
alert("Data tidak ditemukan");
return;
}

dataSiswa[idx] = {
nis:nis.value,
nisn:nisn.value,
nama:nama.value,
jk:jk.value,
tempat:tempat.value,
tanggal:tanggal.value,
alamat:alamat.value
};

save();
renderTable();
clearForm();
}

// ================= HAPUS =================
function hapus(){

dataSiswa = dataSiswa.filter(d => d.nisn !== nisn.value);

save();
renderTable();
clearForm();
}

// ================= CLEAR =================
function clearForm(){
document.querySelectorAll("input").forEach(i => i.value="");
}

// ================= DOWNLOAD =================
function downloadCSV(){

let csv = "";

// ================= HEADER =================
csv += "DATA SISWA\n";
csv += "NO;NIS;NISN;NAMA;JK;TEMPAT;TANGGAL;ALAMAT\n";

// ================= DATA =================
dataSiswa.forEach((d,i)=>{

let row = `${i+1};${d.nis};${d.nisn};${d.nama};${d.jk};${d.tempat};${d.tanggal};${d.alamat}`;

csv += row + "\n";

});

// ================= KIRIM KE ANDROID =================
Android.downloadCSV(csv);

}


// ================= START =================
window.onload = load;

</script>
<div class="footer">
© 2026 Sistem Data Peserta Didik
</div>
</body>
</html>
